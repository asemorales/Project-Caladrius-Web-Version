html/head_include="<!-- Center canvas in the window. -->
<style>
#canvas {
    margin: auto;
    padding: 0;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
}
</style>
<!-- Resize canvas to maintain 16:9 aspect ratio. -->
<script>
window.addEventListener( 'resize', () => {
    const canvas = document.getElementById( 'canvas' );
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    const height = ( windowWidth / 16 ) * 9;

    if ( windowWidth < windowHeight ) {
        canvas.width = windowWidth;
        canvas.height = height;
        return;
    } else if ( windowWidth > windowHeight && height > windowHeight ) {
        canvas.width = ( windowHeight / 9 ) * 16;
        canvas.height = windowHeight;
        return;
    }
	
    canvas.width = windowWidth;
    canvas.height = height;
} );

window.addEventListener( 'DOMContentLoaded', () => {
    window.dispatchEvent( new Event( 'resize' ) );
} );

var secrets_callback = {
    dataLoaded: null
};

function loadData() {
    var input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', '.json');
    input.click();

    input.addEventListener('change', evt => {
        var file = evt.target.files[0];
        var reader = new FileReader();

        reader.readAsText(file);

        reader.onloadend = function(evt) {
            if (secrets_callback.dataLoaded) {
                secrets_callback.dataLoaded(reader.result);
            }
        }
    });
}

var auth_token_callback = {
    dataLoaded: null
};

function authenticate_Google(jwt) {
	fetch(
        \"https://oauth2.googleapis.com/token\",
        {
            method: \"POST\",
            body: JSON.stringify({
                \"grant_type\": \"urn:ietf:params:oauth:grant-type:jwt-bearer\",
		        \"assertion\": jwt
            }),
            headers: {
                
            },
        }
    )
    .then((response) => response.json())
    .then((json) => auth_token_callback.dataLoaded(JSON.stringify(json)));
}

var database_callback = {
    dataLoaded: null
};

function fetch_database_data(auth_token, sheet_name, range_start, range_end) {
    var endpoint = \"https://sheets.googleapis.com/v4/spreadsheets/\"
	var _spreadsheet_id = \"1C3OvlZ95G_2BiZUeCp4Ni6PqJqS5opYIoxhDytnwsVk\"

    var true_sheet_name = sheet_name
    if (sheet_name == \"Headers\") {
        true_sheet_name = \"Patient\"
    }

    var _values_range = true_sheet_name + \"!\" + range_start + \":\" + range_end

    fetch(
        endpoint + _spreadsheet_id + \"/values/\" + _values_range,
        {
            method: \"GET\",
            headers: {
                \"Authorization\": \"Bearer \" + auth_token
            },
        }
    )
    .then((response) => response.json())
    .then((json) => {
        json[\"sheet_name\"] = sheet_name;
        database_callback.dataLoaded(JSON.stringify(json));
    });
}

var mediaRecorder;
var reader;
var audioBase64String = \"\";
var dataArray = [];

var audio_callback = {
    dataLoaded: null
};

function setupAudio() {
    reader = new FileReader();
    reader.onloadend = function () {
        audioBase64String = reader.result;
        audioBase64String = audioBase64String.substring(audioBase64String.indexOf(',') + 1);

        let json = {
            audio: audioBase64String
        };

        audio_callback.dataLoaded(JSON.stringify(json));
    }

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function (mediaStreamObj) {
        mediaRecorder = new MediaRecorder(mediaStreamObj, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = function (ev) {
            dataArray.push(ev.data);
        };

        mediaRecorder.onstop = function (ev) {
            let audioData = new Blob(dataArray, { 'type': 'audio/webm' });
            reader.readAsDataURL(audioData);

            dataArray = [];
        };
    });
}

function startRecording() {
    mediaRecorder.start();
}

function stopRecording() {
    mediaRecorder.stop();
}

var transcript_callback = {
    dataLoaded: null
}

function callGoogleSTTv1(audio, mix_rate, api_key) {
    fetch(
        \"https://speech.googleapis.com/v1/speech:recognize?key=\" + api_key,
        {
            method: \"POST\",
            body: JSON.stringify({
                \"config\": {
                    \"encoding\": \"WEBM_OPUS\",
                    \"sampleRateHertz\": mix_rate,
                    \"languageCode\": \"en-US\",
                    \"alternativeLanguageCodes\": [
                        \"fil-PH\"
                    ]
                },
                \"audio\": {
                    \"content\": audio
                },
            }),
            headers: {
                \"Content-Type\": \"audio/webm\",
                \"Accept\": \"*/*\",
            },
        }
    )
    .then((response) => response.json())
    .then((json) => {
        let no_alternatives = true;
        let results = \"\";
        results = \"results\" in json ? json[\"results\"] : \"\";
        if (results == \"\") {
            transcript_callback.dataLoaded(JSON.stringify({ \"result\": \"No Audio\" }));
            return;
        }

        let generated_transcript = \"\";
        results.forEach(result => {
            let alternatives = \"alternatives\" in result ? result[\"alternatives\"] : \"\";
            if (alternatives != \"\") {
                let transcript = \"transcript\" in alternatives[0] ? alternatives[0][\"transcript\"] : \"\";
                if (transcript != \"\") {
                    generated_transcript += transcript;
                    no_alternatives = false;
                }
            }
        });
        if (!no_alternatives) {
            transcript_callback.dataLoaded(JSON.stringify({ \"result\": generated_transcript }));
            return;
        }

        transcript_callback.dataLoaded(JSON.stringify({ \"result\": \"Unintelligible\" }));
    });
}

function callGoogleSTTv2(endpoint, lang_code, mix_rate, audio, auth_token) {
    fetch(
        endpoint,
        {
            method: \"POST\",
            body: JSON.stringify({
                \"config\": {
                    \"model\": \"chirp_2\",
                    \"languageCodes\": [lang_code],
                    \"explicitDecodingConfig\": {
                        \"encoding\": \"WEBM_OPUS\",
                        \"sampleRateHertz\": mix_rate,
                        \"audioChannelCount\" : 1
                    }
                },
				\"content\": audio
            }),
            headers: {
                \"Authorization\": \"Bearer \" + auth_token,
                \"Content-Type\": \"audio/webm\",
                \"Accept\": \"*/*\",
                \"Format\": \"WEBM_OPUS\",
            },
        }
    )
    .then((response) => response.json())
    .then((json) => {
        let no_alternatives = true;
        let results = \"\";
        results = \"results\" in json ? json[\"results\"] : \"\";
        if (results == \"\") {
            transcript_callback.dataLoaded(JSON.stringify({ \"result\": \"No Audio\" }));
            return;
        }

        let generated_transcript = \"\";
        results.forEach(result => {
            let alternatives = \"alternatives\" in result ? result[\"alternatives\"] : \"\";
            if (alternatives != \"\") {
                let transcript = \"transcript\" in alternatives[0] ? alternatives[0][\"transcript\"] : \"\";
                if (transcript != \"\") {
                    generated_transcript += transcript;
                    no_alternatives = false;
                }
            }
        });
        if (!no_alternatives) {
            transcript_callback.dataLoaded(JSON.stringify({ \"result\": generated_transcript }));
            return;
        }

        transcript_callback.dataLoaded(JSON.stringify({ \"result\": \"Unintelligible\" }));
    });
}
</script>"
